worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Define the backend servers (these names match the service names in docker-compose.yml)
    upstream app_servers {
        # Round Robin is the default balancing method
        server webapp1:5000;
        server webapp2:5000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            # Proxy all requests to the upstream group
            proxy_pass http://app_servers;

            # These headers are important for the application to see the correct client IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /_health {
            proxy_pass http://app_servers/_health;
        }
    }
}
