version: '3.8'

services:
  # --- 1. Application Containers (The Backend Servers) ---
  webapp1:
    build: .
    container_name: webapp1
    environment:
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: ${FLASK_ENV}
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - 5000

  webapp2:
    build: .
    container_name: webapp2
    environment:
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: ${FLASK_ENV}
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - 5000

  # --- 2. Load Balancer / Reverse Proxy Container ---
  proxy:
    image: nginx:latest
    container_name: nginx_proxy
    # Map host port 80 to Nginx port 80 (where you'll access the site)
    ports:
      - "80:80"
    volumes:
      # Mount the custom Nginx config file
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webapp1
      - webapp2

  # --- 3. Database Container ---
  db:
    image: postgres:13
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: facebook_clone_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
